<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>賓果遊戲</title>
</head>

<body>
<p>
  <img src="../Desktop/images/1.gif" id="p1" width="100" height="100" alt=""/>
  <img src="../Desktop/images/2.gif" id="p2" width="100" height="100" alt=""/>
  <img src="../Desktop/images/3.gif" id="p3" width="100" height="100" alt=""/>
</p>

<p>
  <input type="button" value="開始抽獎" onclick="playGame()">
</p>

<h2 id="msg"></h2>

<script>
function playGame() {
    var pics = ["images/1.gif", "images/2.gif", "images/3.gif"];

    var n1 = Math.floor(Math.random() * 3);
    var n2 = Math.floor(Math.random() * 3);
    var n3 = Math.floor(Math.random() * 3);

    document.getElementById("p1").src = pics[n1];
    document.getElementById("p2").src = pics[n2];
    document.getElementById("p3").src = pics[n3];

    var msg = document.getElementById("msg");
    if (n1 == n2 && n2 == n3) {
        msg.innerHTML = "🎉 恭喜中獎！";
    } else {
        msg.innerHTML = "沒中獎，再試一次！";
    }
}
</script>
</body>
