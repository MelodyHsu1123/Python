<html>
<head>
<meta charset="utf-8">
<title>無標題文件</title>
<script language="javascript">
	function play(){
    let no1 = Math.floor(Math.random()*6+1);
    let no2 = Math.floor(Math.random()*6+1);
    
    // Update the first image
    document.pic1.src = no1 + ".jpg";
    
    // Update the second image (Changed from pic1 to pic2)
    document.pic2.src = no2 + ".jpg";
    
    // Optional: Show the total in your textfield
    document.getElementById("textfield").value = no1 + no2;
}
	
	</script>
	</head>

<body>
<p><img src="gamepic/1.jpg" width="146" height="146"  name= "pic1" alt=""/>
  <img src="gamepic/1.jpg" width="146" height="146" name="pic2" alt=""/>
</p>
<p>
  <label for="textfield"><strong id="docs-internal-guid-32524174-7fff-af06-40e3-8c563538858e">點數</strong>:</label>
  <input type="text" name="textfield" id="textfield">
  <input type="button" name="button" id="button" value="擲出" onClick="play()">
	</p>&nbsp;</p>
</body>
</html>
